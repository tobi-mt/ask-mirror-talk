# Railway deployment configuration
# This file is automatically detected by Railway

# Strategy: Use default "Dockerfile" (lightweight API image)
# Override per-service in Railway Dashboard using custom Dockerfile path

[build]
builder = "dockerfile"
# dockerfilePath defaults to "Dockerfile" (API image)

[deploy]
# Per-service configuration in Railway Dashboard:
#
# mirror-talk-api service:
#   Settings > Build: Leave default (uses Dockerfile)
#   Settings > Deploy > Healthcheck: Enable, path=/health, timeout=300
#   Settings > Deploy > Start Command: (leave default)
#
# mirror-talk-ingestion service:
#   Settings > Build > Dockerfile Path: Dockerfile.worker (MUST OVERRIDE)
#   Settings > Deploy > Healthcheck: Disable
#   Settings > Deploy > Start Command: python scripts/bulk_ingest.py --max-episodes 20 --no-confirm
#   Settings > Variables > WHISPER_MODEL: tiny
#
# mirror-talk-push-cron service (preferred single hourly push runner):
#   Settings > Build > Dockerfile Path: Dockerfile.worker
#   Settings > Deploy > Cron Schedule: 0 * * * * (every hour)
#   Settings > Deploy > Start Command: python3 scripts/send_due_push_notifications.py
#   Settings > Variables: same DB + VAPID keys as the API service
#   Note: This runs QOTD, midday motivation, streak protection, and nightly
#         reflection in one process. Postgres filters each send by subscriber
#         timezone, so every region is covered when the job runs hourly.
#
# Optional separate-service alternative:
# mirror-talk-qotd-cron service (daily question — runs every hour):
#   Settings > Build > Dockerfile Path: Dockerfile.worker
#   Settings > Deploy > Cron Schedule: 0 * * * * (every hour)
#   Settings > Deploy > Start Command: python3 scripts/send_daily_qotd.py
#   Settings > Variables: same DB + VAPID keys as the API service
#
# mirror-talk-midday-cron service (midday motivation — runs every hour):
#   Settings > Build > Dockerfile Path: Dockerfile.worker
#   Settings > Deploy > Cron Schedule: 0 * * * * (every hour)
#   Settings > Deploy > Start Command: python3 scripts/send_midday_motivation.py
#   Settings > Variables: same DB + VAPID keys as the API service
#   Note: Sends to subscribers whose local hour is 12 (noon).
#
# mirror-talk-streak-cron service (streak-protection nudge — runs every hour):
#   Settings > Build > Dockerfile Path: Dockerfile.worker
#   Settings > Deploy > Cron Schedule: 0 * * * * (every hour)
#   Settings > Deploy > Start Command: python3 scripts/send_streak_protection.py
#   Settings > Variables: same DB + VAPID keys as the API service
#   Note: Sends to subscribers whose local hour is 20 (8 PM). Encourages users
#         who haven't asked a question today to keep their streak alive.
#
# mirror-talk-nightly-cron service (nightly reflection — runs every hour):
#   Settings > Build > Dockerfile Path: Dockerfile.worker
#   Settings > Deploy > Cron Schedule: 0 * * * * (every hour)
#   Settings > Deploy > Start Command: python3 scripts/send_nightly_reflection.py
#   Settings > Variables: same DB + VAPID keys as the API service
#   Note: Sends to subscribers whose local hour is 21 (9 PM).
