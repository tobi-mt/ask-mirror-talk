<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep espresso diagonal background -->
    <linearGradient id="bg" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%"   stop-color="#3e2e1c"/>
      <stop offset="55%"  stop-color="#1a1209"/>
      <stop offset="100%" stop-color="#090604"/>
    </linearGradient>

    <!-- Warm radial ambient glow -->
    <radialGradient id="warm" cx="50%" cy="43%" r="50%">
      <stop offset="0%"   stop-color="#7c5024" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#090604" stop-opacity="0"/>
    </radialGradient>

    <!-- Mirror disc interior — dark obsidian glass -->
    <radialGradient id="disc" cx="36%" cy="28%" r="78%">
      <stop offset="0%"   stop-color="#302218"/>
      <stop offset="50%"  stop-color="#161009"/>
      <stop offset="100%" stop-color="#0c0906"/>
    </radialGradient>

    <!-- Gold metallic sweep (bright top → deep bottom) -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f6dc6e"/>
      <stop offset="22%"  stop-color="#e2aa40"/>
      <stop offset="68%"  stop-color="#c0882a"/>
      <stop offset="100%" stop-color="#8a5e18"/>
    </linearGradient>

    <!-- Bright gold for ring edge highlight -->
    <linearGradient id="goldEdge" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#f9e898"/>
      <stop offset="45%"  stop-color="#d8a43e"/>
      <stop offset="100%" stop-color="#9a6a1e"/>
    </linearGradient>

    <!-- Disc top-left glass reflection -->
    <radialGradient id="discRefl" cx="34%" cy="26%" r="62%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Classic glossy dome highlight -->
    <linearGradient id="glassDome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Bright specular at very top edge -->
    <radialGradient id="spec" cx="50%" cy="0%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft gold glow for the M glyph -->
    <filter id="mGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feFlood flood-color="#d49010" flood-opacity="0.80" result="colour"/>
      <feComposite in="colour" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- ═══ Background ═══ -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#warm)"/>

  <!-- ═══ Outer gold rim on the icon edge ═══ -->
  <rect x="2" y="2" width="508" height="508" rx="111"
        fill="none" stroke="url(#goldEdge)" stroke-width="2.5"
        opacity="0.55" clip-path="url(#clip)"/>

  <!-- ═══ Mirror frame — thick gold ring ═══ -->
  <circle cx="256" cy="220" r="161" fill="url(#goldEdge)"/>
  <!-- Slightly recessed inner ring for depth -->
  <circle cx="256" cy="220" r="155" fill="#9a6820" opacity="0.6"/>
  <!-- Dark obsidian disc interior -->
  <circle cx="256" cy="220" r="148" fill="url(#disc)"/>
  <!-- Glass reflection on disc surface -->
  <circle cx="256" cy="220" r="148" fill="url(#discRefl)"/>
  <!-- Inner decorative hairline ring -->
  <circle cx="256" cy="220" r="143" fill="none" stroke="#c89030" stroke-width="1" opacity="0.50"/>
  <circle cx="256" cy="220" r="138" fill="none" stroke="#7a5012" stroke-width="0.6" opacity="0.35"/>

  <!-- ═══ "MT" glyph — centrepiece ═══ -->
  <text x="256" y="258"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="164" font-weight="700"
        fill="url(#gold)"
        text-anchor="middle" dominant-baseline="middle"
        filter="url(#mGlow)">MT</text>

  <!-- ═══ Accent: thin horizontal rule below M ═══ -->
  <line x1="188" y1="340" x2="324" y2="340"
        stroke="url(#gold)" stroke-width="1.5" opacity="0.55"/>

  <!-- ═══ Accent: diamond pip crowning the disc ═══ -->
  <polygon points="256,88  263,101  256,114  249,101"
           fill="#f6dc6e" opacity="0.80"/>

  <!-- ═══ "ASK" caption ═══ -->
  <text x="256" y="434"
        font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="500"
        fill="url(#gold)"
        text-anchor="middle" letter-spacing="9" opacity="0.88">ASK</text>
  <!-- Flanking decorative dots -->
  <circle cx="188" cy="434" r="2.4" fill="#c88a26" opacity="0.60"/>
  <circle cx="324" cy="434" r="2.4" fill="#c88a26" opacity="0.60"/>

  <!-- ═══ Glass dome overlay — the "glossy premium" effect ═══ -->
  <!-- Main dome: covers upper ~52% of icon -->
  <ellipse cx="256" cy="180" rx="240" ry="180"
           fill="url(#glassDome)" clip-path="url(#clip)"/>
  <!-- Bright specular at very top -->
  <ellipse cx="256" cy="52"  rx="148" ry="66"
           fill="url(#spec)" clip-path="url(#clip)"/>
</svg>
