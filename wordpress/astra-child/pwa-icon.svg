<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#ffcb2e"/>
      <stop offset="55%"  stop-color="#d4700a"/>
      <stop offset="100%" stop-color="#943e08"/>
    </radialGradient>
    <radialGradient id="tlGlow" cx="18%" cy="14%" r="65%">
      <stop offset="0%"   stop-color="#ffe080" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffe080" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassDome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spec" cx="50%" cy="0%" r="42%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="4" dy="5" stdDeviation="6" flood-color="#3a1200" flood-opacity="0.55"/>
    </filter>
    <clipPath id="clip"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#tlGlow)"/>
  <circle cx="256" cy="228" r="187" fill="none" stroke="#5a2205" stroke-width="2" opacity="0.20"/>
  <circle cx="256" cy="228" r="174" fill="none" stroke="#5a2205" stroke-width="1" opacity="0.12"/>
  <text x="256" y="262"
        font-family="Futura, &apos;Century Gothic&apos;, &apos;Gill Sans&apos;, sans-serif"
        font-size="212" font-weight="700" fill="#160800"
        text-anchor="middle" dominant-baseline="middle"
        filter="url(#textShadow)">ASK</text>
  <text x="256" y="257"
        font-family="Futura, &apos;Century Gothic&apos;, &apos;Gill Sans&apos;, sans-serif"
        font-size="212" font-weight="700" fill="#ffe8a0" fill-opacity="0.12"
        text-anchor="middle" dominant-baseline="middle">ASK</text>
  <line x1="148" y1="370" x2="364" y2="370" stroke="#5a2205" stroke-width="2" opacity="0.45"/>
  <text x="256" y="418"
        font-family="Futura, &apos;Century Gothic&apos;, &apos;Gill Sans&apos;, sans-serif"
        font-size="38" font-weight="500" fill="#4a1a02"
        text-anchor="middle" dominant-baseline="middle" letter-spacing="2">Mirror Talk</text>
  <ellipse cx="256" cy="170" rx="245" ry="185" fill="url(#glassDome)" clip-path="url(#clip)"/>
  <ellipse cx="256" cy="48"  rx="142" ry="62"  fill="url(#spec)"     clip-path="url(#clip)"/>
